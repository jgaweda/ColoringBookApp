<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#5856D6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Greedy Cookie" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="description" content="A kid-friendly offline coloring book — bright colors, simple taps, big stickers." />
  <title>Greedy Cookie — Coloring Book</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="apple-touch-startup-image" href="./splash/ipadpro129-portrait.png"  media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/ipadpro129-landscape.png" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
  <link rel="apple-touch-startup-image" href="./splash/ipadpro11-portrait.png"   media="screen and (device-width: 834px)  and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/ipadpro11-landscape.png"  media="screen and (device-width: 834px)  and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
  <link rel="apple-touch-startup-image" href="./splash/ipadair-portrait.png"     media="screen and (device-width: 820px)  and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/ipadair-landscape.png"    media="screen and (device-width: 820px)  and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
  <link rel="apple-touch-startup-image" href="./splash/ipad-portrait.png"        media="screen and (device-width: 810px)  and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/ipad-landscape.png"       media="screen and (device-width: 810px)  and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app" aria-live="polite"></div>

  <template id="tpl-home">
    <header class="home-header">
      <div class="title-block">
        <h1 class="display">Greedy Cookie</h1>
        <p class="subtitle">Coloring Book</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" data-action="gallery" aria-label="Gallery">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v12h14V6H5zm3 7l2.5 3 3.5-4.5L18 17H6l2-4z" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" data-action="settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm9 4a8.93 8.93 0 00-.1-1.3l2.1-1.6-2-3.5-2.5 1a8.93 8.93 0 00-2.3-1.3L15 3h-4l-1.2 2.3a8.93 8.93 0 00-2.3 1.3l-2.5-1-2 3.5L5.1 10.7c-.07.43-.1.86-.1 1.3s.03.87.1 1.3l-2.1 1.6 2 3.5 2.5-1c.7.5 1.5.95 2.3 1.3L11 21h4l1.2-2.3c.8-.35 1.6-.8 2.3-1.3l2.5 1 2-3.5-2.1-1.6c.07-.43.1-.86.1-1.3z" fill="currentColor"/></svg>
        </button>
      </div>
    </header>
    <section class="categories" aria-label="Categories">
      <!-- Filled at runtime -->
    </section>
  </template>

  <template id="tpl-canvas">
    <header class="canvas-header">
      <button class="icon-btn back" data-action="back" aria-label="Back to home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2 class="page-title"></h2>
      <span class="spacer"></span>
    </header>
    <div class="stage-wrap">
      <aside class="tools" aria-label="Tools">
        <button class="tool" data-tool="bucket" aria-pressed="true" aria-label="Fill"><svg viewBox="0 0 24 24"><path d="M19 11l-7-7-1.4 1.4L12 7 4.6 14.4a2 2 0 000 2.8l4.2 4.2a2 2 0 002.8 0L19 14a2 2 0 000-3zM5.2 16l5.8-5.8 5.8 5.8H5.2z" fill="currentColor"/><circle cx="20" cy="20" r="2" fill="currentColor"/></svg></button>
        <button class="tool" data-tool="brush" aria-pressed="false" aria-label="Brush"><svg viewBox="0 0 24 24"><path d="M5 19l9-9 3 3-9 9H5v-3zm11-11l3-3 3 3-3 3-3-3z" fill="currentColor"/></svg></button>
        <button class="tool" data-tool="sticker" aria-pressed="false" aria-label="Stickers"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 5.4 5.6.5-4.3 3.9 1.3 5.7L12 14.7 7 17.5l1.3-5.7L4 7.9l5.6-.5z" fill="currentColor"/></svg></button>
        <button class="tool" data-tool="eraser" aria-pressed="false" aria-label="Eraser"><svg viewBox="0 0 24 24"><path d="M16.2 3.8a2 2 0 012.8 0l1.2 1.2a2 2 0 010 2.8L9.4 18.6a2 2 0 01-2.8 0L3.8 15.8a2 2 0 010-2.8L16.2 3.8z" fill="currentColor"/></svg></button>
        <hr/>
        <button class="tool small" data-action="undo" aria-label="Undo" disabled><svg viewBox="0 0 24 24"><path d="M9 5L3 11l6 6v-4h6a4 4 0 010 8h-4v2h4a6 6 0 000-12H9V5z" fill="currentColor"/></svg></button>
        <button class="tool small" data-action="redo" aria-label="Redo" disabled><svg viewBox="0 0 24 24"><path d="M15 5l6 6-6 6v-4H9a4 4 0 000 8h4v2H9A6 6 0 019 11h6V5z" fill="currentColor"/></svg></button>
        <hr/>
        <button class="tool small save" data-action="save" aria-label="Save"><svg viewBox="0 0 24 24"><path d="M9 16.2L5.5 12.7l-1.4 1.4L9 19l11-11-1.4-1.4z" fill="currentColor"/></svg></button>
        <button class="tool small" data-action="share" aria-label="Share"><svg viewBox="0 0 24 24"><path d="M12 3l4 4h-3v9h-2V7H8l4-4zM5 18h14v3H5z" fill="currentColor"/></svg></button>
        <button class="tool small danger" data-action="clear" aria-label="Clear page"><svg viewBox="0 0 24 24"><path d="M9 3h6l1 2h4v2H4V5h4l1-2zm-3 6h12v12a2 2 0 01-2 2H8a2 2 0 01-2-2V9z" fill="currentColor"/></svg></button>
      </aside>

      <div class="stage" data-stage>
        <canvas class="layer paint"></canvas>
        <canvas class="layer line-art"></canvas>
        <canvas class="layer brush"></canvas>
        <div class="sticker-layer" data-sticker-layer></div>
      </div>
    </div>

    <div class="palette-wrap">
      <div class="palette" data-palette aria-label="Color palette"></div>
      <button class="palette-toggle" data-action="palette-toggle" aria-label="More colors">+</button>
    </div>

    <dialog class="sticker-sheet" data-sticker-sheet>
      <div class="sticker-grid"></div>
      <button class="big-btn" data-action="close-stickers">Done</button>
    </dialog>

    <div class="toast" data-toast aria-live="assertive" hidden></div>
  </template>

  <template id="tpl-page-picker">
    <header class="picker-header">
      <button class="icon-btn back" data-action="back" aria-label="Back to home">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2 class="category-title"></h2>
      <span class="spacer"></span>
    </header>
    <p class="picker-subtitle"></p>
    <div class="picker-grid"></div>
  </template>

  <template id="tpl-gallery">
    <header class="picker-header">
      <button class="icon-btn back" data-action="back" aria-label="Back to home">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2>My Gallery</h2>
      <span class="spacer"></span>
    </header>
    <div class="gallery-grid"></div>
    <p class="empty-state" hidden>Color a page and tap the green check to save it here.</p>
  </template>

  <template id="tpl-settings">
    <header class="picker-header">
      <button class="icon-btn back" data-action="back" aria-label="Back to home">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2>Settings</h2>
      <span class="spacer"></span>
    </header>
    <div class="settings-form"></div>
  </template>

  <template id="tpl-parental-gate">
    <div class="gate-content">
      <div class="gate-icon" aria-hidden="true">🔒</div>
      <h2>Grown-ups only!</h2>
      <p>Press and hold the <strong data-target></strong> for 2 seconds.</p>
      <div class="gate-grid"></div>
      <button class="big-btn ghost" data-action="cancel">Cancel</button>
    </div>
  </template>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
