name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pwa:
    name: PWA syntax + imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate JSON
        run: |
          python3 -c "import json; json.load(open('web/data/categories.json'))"
          python3 -c "import json; json.load(open('web/manifest.webmanifest'))"

      - name: JS syntax check
        run: |
          set -e
          for f in $(find web/js -name '*.js'); do node --check "$f"; done
          node --check web/sw.js

      - name: Verify ES module imports resolve
        run: |
          python3 - <<'PY'
          import re, os, sys
          fails = 0
          for root, dirs, files in os.walk("web/js"):
              for f in files:
                  if not f.endswith(".js"): continue
                  p = os.path.join(root, f)
                  with open(p) as fp: src = fp.read()
                  for m in re.finditer(r'from\s+["\']((?:\./|\.\./)[^"\']+)["\']', src):
                      target = m.group(1)
                      full = os.path.normpath(os.path.join(os.path.dirname(p), target))
                      if not os.path.exists(full):
                          print(f"BROKEN  {p}  ->  {target}")
                          fails += 1
          sys.exit(fails)
          PY
