name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"   # preview deploys for the working feature branch
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Backstop in case the gate misses a race: only the latest run for a given
# ref proceeds; older queued ones are cancelled rather than running serially.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: ./.github/actions/build-gate

  build:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PWA icons from SVG
        run: |
          set -eux
          cd web
          rsvg-convert -w 192 -h 192 icon.svg          -o icon-192.png
          rsvg-convert -w 512 -h 512 icon.svg          -o icon-512.png
          rsvg-convert -w 512 -h 512 icon-maskable.svg -o icon-maskable-512.png
          rsvg-convert -w 180 -h 180 icon.svg          -o apple-touch-icon.png
          rsvg-convert -w  32 -h  32 icon.svg          -o favicon-32.png

      # GitHub Pages must be enabled manually in repo Settings once before this
      # workflow can deploy. The workflow's GITHUB_TOKEN cannot create the Pages
      # site itself — the create-pages-site endpoint returns 403 "Resource not
      # accessible by integration" because it requires the `administration`
      # scope, which Actions tokens never carry, even with `pages: write`.
      #
      # If you see "Get Pages site failed" below, do this one-time fix:
      #   Settings -> Pages -> Source -> GitHub Actions -> Save
      #   https://github.com/${{ github.repository }}/settings/pages
      - name: Preflight (Pages must be enabled in repo Settings)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")
          if [ "$status" = "200" ]; then
            echo "::notice::Pages enabled — proceeding."
            exit 0
          fi
          cat <<EOF
          ::error::GitHub Pages is not enabled on this repo (API returned HTTP $status).

          One-time manual fix — takes 10 seconds:
            1. Open: https://github.com/$REPO/settings/pages
            2. Under 'Build and deployment', set 'Source' to 'GitHub Actions'.
            3. Click 'Save'.
            4. Re-run this workflow from the Actions tab.

          (The Actions GITHUB_TOKEN cannot enable Pages itself — that endpoint
          requires repo administration scope which workflow tokens never carry.)
          EOF
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
