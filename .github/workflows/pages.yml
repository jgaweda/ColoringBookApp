name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"   # preview deploys for the working feature branch
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Backstop in case the gate misses a race: only the latest run for a given
# ref proceeds; older queued ones are cancelled rather than running serially.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: ./.github/actions/build-gate

  build:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PWA icons from SVG
        run: |
          set -eux
          cd web
          rsvg-convert -w 192 -h 192 icon.svg          -o icon-192.png
          rsvg-convert -w 512 -h 512 icon.svg          -o icon-512.png
          rsvg-convert -w 512 -h 512 icon-maskable.svg -o icon-maskable-512.png
          rsvg-convert -w 180 -h 180 icon.svg          -o apple-touch-icon.png
          rsvg-convert -w  32 -h  32 icon.svg          -o favicon-32.png

      - name: Ensure GitHub Pages is enabled (idempotent, surfaces real errors)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          # Probe current state — non-200 means not enabled.
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")
          echo "GET /repos/$REPO/pages -> $status"
          cat /tmp/pages.json
          if [ "$status" = "200" ]; then
            echo "::notice::Pages already enabled."
            exit 0
          fi

          # Try to enable Pages with build_type=workflow.
          create_status=$(curl -sS -o /tmp/create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}')
          echo "POST /repos/$REPO/pages -> $create_status"
          cat /tmp/create.json
          if [ "$create_status" = "201" ] || [ "$create_status" = "204" ]; then
            echo "::notice::Pages enabled successfully."
            exit 0
          fi

          # Fall back to switching the source on an already-existing site.
          patch_status=$(curl -sS -o /tmp/patch.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}')
          echo "PUT /repos/$REPO/pages -> $patch_status"
          cat /tmp/patch.json
          if [ "$patch_status" = "204" ]; then
            echo "::notice::Pages source updated to GitHub Actions."
            exit 0
          fi

          echo "::error::Could not enable GitHub Pages automatically. Open the repo Settings -> Pages and set Source to 'GitHub Actions', then re-run this workflow."
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
