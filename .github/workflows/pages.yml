name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"   # preview deploys for the working feature branch
  workflow_dispatch:

permissions:
  actions: read
  contents: write    # the build step writes a diagnostic to a debug branch on Pages-enable failure
  pages: write
  id-token: write

# Backstop in case the gate misses a race: only the latest run for a given
# ref proceeds; older queued ones are cancelled rather than running serially.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: ./.github/actions/build-gate

  build:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PWA icons from SVG
        run: |
          set -eux
          cd web
          rsvg-convert -w 192 -h 192 icon.svg          -o icon-192.png
          rsvg-convert -w 512 -h 512 icon.svg          -o icon-512.png
          rsvg-convert -w 512 -h 512 icon-maskable.svg -o icon-maskable-512.png
          rsvg-convert -w 180 -h 180 icon.svg          -o apple-touch-icon.png
          rsvg-convert -w  32 -h  32 icon.svg          -o favicon-32.png

      - name: Ensure GitHub Pages is enabled
        id: enable_pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -u
          mkdir -p /tmp/diag
          LOG=/tmp/diag/full.log
          : >"$LOG"
          { echo "Pages enablement attempt at $(date -u)"; echo "Repo: $REPO"; echo; } | tee -a "$LOG"

          probe() {
            local method=$1 body=$2 expect=$3 outfile
            outfile=/tmp/diag/${method}.body
            local status
            status=$(curl -sS -o "$outfile" -w "%{http_code}" \
              -X "$method" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              ${body:+-d "$body"} \
              "https://api.github.com/repos/$REPO/pages")
            {
              echo "=== $method /repos/$REPO/pages ==="
              echo "HTTP $status"
              cat "$outfile"
              echo
            } | tee -a "$LOG"
            [ "$status" = "$expect" ]
          }

          if probe GET ""                      200; then
            echo "::notice::Pages already enabled."
            exit 0
          fi
          if probe POST '{"build_type":"workflow"}' 201; then
            echo "::notice::Pages enabled (POST 201)."
            exit 0
          fi
          if probe PUT  '{"build_type":"workflow"}' 204; then
            echo "::notice::Pages source updated to workflow (PUT 204)."
            exit 0
          fi

          # All three failed — persist the diagnostic to a side branch so the
          # exact API response bodies can be read without admin token access.
          {
            echo
            echo "Pages could not be auto-enabled. Manual fix:"
            echo "  Settings -> Pages -> Source -> GitHub Actions -> Save"
            echo "  https://github.com/${REPO}/settings/pages"
            echo "Then re-run this workflow."
          } | tee -a "$LOG"

          set +e
          git config --global user.email "ci@noreply"
          git config --global user.name  "pages-ci-debug"
          rm -rf /tmp/debug-work
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/debug-work
          cd /tmp/debug-work || true
          git checkout --orphan _pages-debug 2>/dev/null
          git rm -rf --cached . 2>/dev/null
          find . -maxdepth 1 -mindepth 1 ! -name '.git' -exec rm -rf {} +
          cp "$LOG" ./pages-enable-failure.log
          echo "run_id=$RUN_ID" > run.txt
          git add -A
          git commit -m "diag: Pages enable failure from run $RUN_ID" 2>&1 | tail -3
          git push -f origin _pages-debug 2>&1 | tail -3

          echo "::error::Pages enablement failed. The API responses are in branch '_pages-debug/pages-enable-failure.log', or enable Pages manually at https://github.com/${REPO}/settings/pages (Source: GitHub Actions)."
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
