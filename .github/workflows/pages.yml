name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"   # preview deploys for the working feature branch
  workflow_dispatch:

permissions:
  actions: read
  contents: write    # the build step writes a diagnostic to a debug branch on Pages-enable failure
  pages: write
  id-token: write

# Backstop in case the gate misses a race: only the latest run for a given
# ref proceeds; older queued ones are cancelled rather than running serially.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: ./.github/actions/build-gate

  build:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PWA icons from SVG
        run: |
          set -eux
          cd web
          rsvg-convert -w 192 -h 192 icon.svg          -o icon-192.png
          rsvg-convert -w 512 -h 512 icon.svg          -o icon-512.png
          rsvg-convert -w 512 -h 512 icon-maskable.svg -o icon-maskable-512.png
          rsvg-convert -w 180 -h 180 icon.svg          -o apple-touch-icon.png
          rsvg-convert -w  32 -h  32 icon.svg          -o favicon-32.png

      - name: Ensure GitHub Pages is enabled
        id: enable_pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          mkdir -p /tmp/diag
          {
            echo "Pages enablement attempt at $(date -u)"
            echo "Repo: $REPO"
            echo ""
            for method in GET POST PUT; do
              body=''
              [ "$method" = "POST" ] && body='-d {"build_type":"workflow"}'
              [ "$method" = "PUT"  ] && body='-d {"build_type":"workflow"}'
              echo "=== $method /repos/$REPO/pages ==="
              status=$(curl -sS -o /tmp/diag/$method.body -w "%{http_code}" \
                -X $method \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                $body \
                "https://api.github.com/repos/$REPO/pages")
              echo "HTTP $status"
              cat /tmp/diag/$method.body
              echo ""
              # 200 on GET = already enabled (success)
              # 201 on POST = newly enabled (success)
              # 204 on PUT = source updated (success)
              if [ "$method$status" = "GET200" ] || [ "$method$status" = "POST201" ] || [ "$method$status" = "PUT204" ]; then
                echo "::notice::Pages OK after $method ($status)"
                exit 0
              fi
            done
            echo ""
            echo "Pages could not be auto-enabled. Most likely cause:"
            echo "  the GITHUB_TOKEN for this workflow does not have administration"
            echo "  rights to create a Pages site. Manually enable Pages once:"
            echo "    Settings -> Pages -> Source = GitHub Actions"
            echo "  Then re-run this workflow."
          } 2>&1 | tee /tmp/diag/full.log

          # Capture the diagnostic on a side branch so it can be inspected
          # without admin-token access to workflow logs.
          git config user.email "ci@noreply"
          git config user.name "pages-ci-debug"
          rm -rf /tmp/debug-work
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/debug-work
          cd /tmp/debug-work
          git checkout --orphan _pages-debug 2>/dev/null || git checkout _pages-debug
          git rm -rf --cached . 2>/dev/null || true
          rm -rf -- *
          cp /tmp/diag/full.log ./pages-enable-failure.log
          echo "Run: ${{ github.run_id }}" > run.txt
          git add -A
          git commit -m "diag: Pages enable failure from run ${{ github.run_id }}" >/dev/null
          git push -f origin _pages-debug
          echo "::error::Pages enablement failed. See branch '_pages-debug/pages-enable-failure.log' for the API response bodies, or enable Pages manually at https://github.com/${REPO}/settings/pages (Source: GitHub Actions)."
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
