name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"   # preview deploys for the working feature branch
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Backstop in case the gate misses a race: only the latest run for a given
# ref proceeds; older queued ones are cancelled rather than running serially.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: ./.github/actions/build-gate

  build:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PWA icons from SVG
        run: |
          set -eux
          cd web
          rsvg-convert -w 192 -h 192 icon.svg          -o icon-192.png
          rsvg-convert -w 512 -h 512 icon.svg          -o icon-512.png
          rsvg-convert -w 512 -h 512 icon-maskable.svg -o icon-maskable-512.png
          rsvg-convert -w 180 -h 180 icon.svg          -o apple-touch-icon.png
          rsvg-convert -w  32 -h  32 icon.svg          -o favicon-32.png

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # First-run self-enable: if the repo doesn't have Pages configured
          # yet, the action will turn it on (source = GitHub Actions). Without
          # this, the action 404s and the whole deploy fails.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
